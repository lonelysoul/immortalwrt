name: Auto Update Check
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master

on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * *' # 定时任务加上单引号防止 YAML 解析歧义

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        # 将源码拉取到独立的 openwrt-src 文件夹，保持工作流根目录干净
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt-src
        cd openwrt-src
        echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v5 # 成功升级到官方最新的 v5 版本
      with:
        path: .commitHash
        # 缓存键值中加入了分支名，防止多分支切换时缓存冲突
        key: HEAD-${{ env.REPO_BRANCH }}-${{ steps.getHash.outputs.commitHash }}
        
    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        # 只有在缓存未命中（说明有新提交）时，才创建此文件供后续 Post 阶段打包
        echo ${{ steps.getHash.outputs.commitHash }} > .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v4 # 成功升级到最新的 v4 版本
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Upstream Triggered Build
        
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3