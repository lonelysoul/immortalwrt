name: ImmortalWrt Firmware Build (x86 Stable)

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  SSH_ENABLED: false
  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:

    # 🧾 1. 拉取仓库（含.config）
    - name: Checkout repository
      uses: actions/checkout@v6

    # 🧰 2. 初始化环境
    - name: Init environment
      run: |
        echo "===== 系统信息 ====="
        uname -a
        lsb_release -a || true
        free -h
        df -hT
        echo "msmtp msmtp/apparmor boolean false" | sudo debconf-set-selections
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev  libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd 
        sudo timedatectl set-timezone "$TZ"

    # 📥 3. 克隆源码
    - name: Clone source
      run: |
        mkdir -p compile
        cd compile
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        ln -sf $GITHUB_WORKSPACE/compile/openwrt $GITHUB_WORKSPACE/openwrt

    # ⚡ 4. 缓存（必须在源码存在后）
    - name: Restore cache
      uses: actions/cache@v5
      with:
        path: |
          openwrt/dl
          openwrt/.ccache
        key: ${{ runner.os }}-openwrt-${{ hashFiles('.config') }}

    - name: SSH连接到Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: env.SSH_ENABLED == 'true' || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    # ⚙️ 5. feeds
    - name: Update feeds
      run: |
        [ -f "$FEEDS_CONF" ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 🧠 6. 加载 config
    - name: Load config
      run: |
        set -e

        CONFIG_PATH="$GITHUB_WORKSPACE/$CONFIG_FILE"

        if [ ! -f "$CONFIG_PATH" ]; then
          echo "❌ .config 不存在"
          exit 1
        fi

        cp "$CONFIG_PATH" openwrt/.config
        cd openwrt

        make defconfig

        echo "===== 当前 Target ====="
        grep CONFIG_TARGET .config | head

        # ❗强制 x86
        if ! grep -q "CONFIG_TARGET_x86=y" .config; then
          echo "❌ 当前不是 x86 配置"
          exit 1
        fi

    # 📦 7. 下载依赖
    - name: Download packages
      run: |
        cd openwrt
        make download -j$(nproc)

    # 🏗️ 8. 编译
    - name: Compile firmware
      id: compile
      run: |
        cd openwrt

        export CCACHE_DIR=$PWD/.ccache
        export CCACHE_MAXSIZE=2G
        ccache -M 2G

        echo "===== 开始编译 ====="
        make -j$(nproc) || make -j1 V=s

        echo "status=success" >> $GITHUB_OUTPUT

    # 📂 9. 检查固件
    - name: Check firmware
      run: |
        echo "===== 固件输出 ====="
        find openwrt/bin/targets -type f | grep -E "\.(img|img.gz|bin)$" || {
          echo "❌ 未生成固件"
          exit 1
        }

    # 🏷️ 10. 生成 tag
    - name: Create tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        TAG=$(date +"%Y.%m.%d-%H%M")
        echo "release_tag=$TAG" >> $GITHUB_OUTPUT
        echo "Build Time: $(date)" > release.txt

    # 🚀 11. 发布
    - name: Upload Release
      uses: softprops/action-gh-release@v3
      if: env.UPLOAD_RELEASE == 'true'
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          openwrt/bin/targets/x86/64/*.img.gz
          openwrt/bin/targets/x86/64/*.img
          openwrt/bin/targets/x86/64/*.bin
          openwrt/bin/targets/x86/64/*.manifest
          openwrt/bin/targets/x86/64/*.buildinfo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 🧹 12. 删除旧 workflow 记录
    - name: Cleanup workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 5
        keep_minimum_runs: 2

    # 🗑️ 13. 删除旧 release
    - name: Delete old releases
      run: |
        gh release list --limit 30 | tail -n +8 | awk '{print $1}' | xargs -I {} gh release delete {} -y
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 📢 14. Telegram 通知
    - name: Notify Telegram
      if: success()
      uses: actions/github-script@v9
      with:
        script: |
          const token = process.env.TELEGRAM_BOT_TOKEN;
          const chat = process.env.TELEGRAM_CHAT_ID;
          const msg = `✅ ImmortalWrt x86 编译完成\n📦 Release: https://github.com/${context.repo.owner}/${context.repo.repo}/releases`;

          await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chat, text: msg })
          });
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
